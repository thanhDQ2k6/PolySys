<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng Chat đơn giản</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right bottom, #a8c0ff, #3f2b96);
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #007bff;
            color: white;
            padding: 15px 20px;
            font-size: 1.2em;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            /* Thêm Flexbox để căn chỉnh tiêu đề và số lượng người online */
            display: flex;
            justify-content: space-between; /* Đẩy nội dung ra hai bên */
            align-items: center; /* Căn giữa theo chiều dọc */
        }
        #client-count {
            font-size: 0.9em;
            color: #cceeff; /* Màu chữ nhạt hơn một chút */
            font-weight: bold;
        }
        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Khoảng cách giữa các tin nhắn */
        }
        .message {
            background-color: #e9e9eb;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
            align-self: flex-start; /* Tin nhắn của người khác */
        }
        .message.my-message {
            background-color: #dcf8c6; /* Màu xanh lá nhạt cho tin nhắn của mình */
            align-self: flex-end; /* Tin nhắn của mình */
        }
        /* Style cho tin nhắn hệ thống (type 0 và 1) */
        .message.system-message {
            background-color: #FFFACD; /* Màu vàng nhạt (Lemon Chiffon) */
            color: #6a5a00; /* Màu chữ đậm hơn để dễ đọc */
            font-style: italic;
            text-align: center;
            align-self: center; /* Căn giữa trong khung chat */
            max-width: 90%; /* Cho phép chiếm nhiều không gian hơn */
            border: 1px solid #FFD700; /* Viền vàng nhẹ */
        }
        /* Style cho tin nhắn lỗi (type -1) */
        .message.error-message {
            background-color: #FFEBEE; /* Màu đỏ nhạt */
            color: #D32F2F; /* Màu chữ đỏ đậm */
            font-weight: bold;
            text-align: center;
            align-self: center;
            max-width: 90%;
            border: 1px solid #EF5350;
        }
        .message strong {
            font-size: 0.9em;
            color: #555;
            display: block;
            margin-bottom: 3px;
        }
        .message.my-message strong {
            color: #333;
        }
        .chat-input {
            display: flex;
            padding: 15px 20px;
            border-top: 1px solid #eee;
        }
        .chat-input input[type="text"] {
            flex-grow: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 1em;
            outline: none;
            margin-right: 10px;
        }
        .chat-input button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }
        .chat-input button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span>Chat Room</span>
        <span id="client-count">Onlines: 0</span> <!-- Đã thêm để hiển thị số người online -->
    </div>
    <div class="chat-messages" id="chatMessages">
        <!-- Tin nhắn sẽ được thêm vào đây bởi JavaScript -->
    </div>
    <div class="chat-input">
        <label for="messageInput" class="sr-only"></label> <!-- Thêm label cho input -->
        <input type="text" id="messageInput" placeholder="Nhập tin nhắn của bạn...">
        <button id="sendButton">Gửi</button>
    </div>
</div>

<!-- Liên kết đến file JavaScript -->
<script src="../js/chat.js"></script>
</body>
</html>
