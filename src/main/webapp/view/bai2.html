<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File và nhận JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            background-color: #f0f2f5;
        }

        h1 {
            color: #333;
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        input[type="file"] {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #28a745;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
<h1>Upload File đến Servlet</h1>
<form id="uploadForm">
    <label for="file">Chọn file:</label><br>
    <input type="file" id="file" name="file"><br>
    <button type="submit">Upload File</button>
</form>

<script>
    const uploadForm = document.getElementById('uploadForm');

    uploadForm.addEventListener('submit', function (event) {
        // Ngăn form gửi request theo cách truyền thống
        event.preventDefault();

        // Lấy file từ input
        const fileInput = document.getElementById('file');
        const file = fileInput.files[0];

        if (!file) {
            alert('Vui lòng chọn một file để upload.');
            return;
        }

        // Tạo đối tượng FormData để chứa dữ liệu form (bao gồm cả file)
        const formData = new FormData();
        formData.append('file', file); // 'file' phải trùng với tên trong servlet

        // URL của servlet đã được ánh xạ đến "/upload-servlet"
        const servletUrl = 'http://localhost:8080/PolySys_war/lab7/bai2';

        fetch(servletUrl, {
            method: 'POST',
            body: formData // Gửi FormData object
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Mã lỗi HTTP: ' + response.status);
                }
                // Phân tích cú pháp JSON từ phản hồi
                return response.json();
            })
            .then(data => {
                // In đối tượng JSON đã nhận được ra console
                console.log('Thông tin file nhận được từ Servlet:');
                console.log(data);
                alert('File đã được upload thành công và thông tin đã được xuất ra Console!');
            })
            .catch(error => {
                console.error('Đã xảy ra lỗi:', error);
                alert('Đã xảy ra lỗi khi upload file. Vui lòng kiểm tra console.');
            });
    });
</script>
</body>
</html>
